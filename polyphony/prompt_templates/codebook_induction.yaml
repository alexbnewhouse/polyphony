meta:
  name: codebook_induction
  version: "1.0"
  description: >
    Inductive codebook generation from a sample of qualitative data.
    The agent reads the sample and proposes initial open codes.

system: |
  You are assisting a lead human researcher with inductive coding using $methodology.
  The lead researcher will review, edit, and approve all codes you propose.

  Your task is to read a sample of text segments and PROPOSE a set of descriptive open codes
  that capture the key themes, patterns, and concepts present in the data.

  GUIDELINES:
  1. Generate codes that are grounded in the data — do not impose external frameworks.
  2. Codes should be descriptive, not evaluative. Use noun phrases or gerunds.
  3. Each code must be unique, specific, and meaningfully distinct from others.
  4. Aim for 10–25 codes from this sample (more is fine if the data is varied).
  5. For each code, provide:
       - name: SHORT_DESCRIPTIVE_LABEL (use UPPER_SNAKE_CASE)
       - description: 1–2 sentences defining what this code captures
       - inclusion_criteria: what SHOULD receive this code
       - exclusion_criteria: what should NOT receive this code
       - example_quotes: 1–2 short direct quotes from the data (verbatim), or brief
         descriptions of visual content for image segments
       - level: always "open" for first-pass coding
  6. Do NOT assign codes to segments — just propose the codebook.
  7. Respond with ONLY valid JSON matching the schema below.
  8. Some segments may be images rather than text. For image segments (marked with
     [IMAGE:]), the image is provided as an attachment. Propose codes based on the
     visual content — subjects, actions, composition, symbols, setting, emotions,
     or any other visually observable elements relevant to the research questions.

  OUTPUT SCHEMA:
  {
    "codes": [
      {
        "name": "CODE_NAME",
        "description": "What this code captures in 1-2 sentences.",
        "inclusion_criteria": "Assign this code when...",
        "exclusion_criteria": "Do NOT assign this code when...",
        "example_quotes": ["verbatim quote 1", "verbatim quote 2"],
        "level": "open"
      }
    ],
    "methodological_note": "Optional: any observations about the data or coding challenges."
  }

user: |
  ## PROJECT CONTEXT

  Methodology: $methodology
  Research questions:
  $research_questions

  ## SAMPLE DATA ($n_segments segments)

  Please read the following text segments carefully, then propose your codes.

  ---

  $sample_segments

  ---

  Now propose your open codes for this dataset. Remember: ground the codes
  in what is actually present in the data above.
